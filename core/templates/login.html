{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Stock System | Login </title>
    <!-- Custom fonts for this template-->
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">
</head>
<body class="bg-gradient-primary">

<style>
    body {
        overflow: hidden;
        font-family: 'Nunito', sans-serif;
    }

    /* Background animé */
    .bg-animation {
        position: fixed;
        width: 100%;
        height: 100%;
        background: linear-gradient(-45deg, #4e73df, #1cc88a, #36b9cc, #2c3e50);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
        z-index: -2;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Glass card */
    .glass-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-title {
        font-weight: 700;
        color: white;
    }

    .form-control-user {
        border-radius: 50px;
        padding: 12px;
    }

    .btn-login {
        border-radius: 50px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-login:hover {
        transform: scale(1.05);
    }

    .logo-box img {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid white;
    }
</style>

<div class="bg-animation"></div>

<div class="container d-flex align-items-center justify-content-center min-vh-100">

    <div class="col-xl-5 col-lg-6 col-md-8">

        <div class="glass-card p-5 text-center text-white">

            <!-- LOGO -->
            <div class="logo-box mb-3">
                {% if shop.logo %}
                    <img src="{{ shop.logo.url }}">
                {% else %}
                    <img src="{% static 'img/default.jpg' %}">
                {% endif %}
            </div>

            <h3 class="login-title">Smart POS System</h3>
            <p class="text-white-50">Restaurant • Stock • Facturation</p>

            <!-- ALERTS -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- FORM -->
            <form method="POST" class="mt-4">
                {% csrf_token %}

                <div class="form-group mb-3">
                    <input type="text" name="username"
                           class="form-control form-control-user"
                           placeholder="Nom d'utilisateur" required>
                </div>

                <div class="form-group mb-3">
                    <input type="password" name="password"
                           class="form-control form-control-user"
                           placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn btn-light btn-block btn-login w-100">
                    🔐 Se connecter
                </button>
            </form>

            <hr class="bg-white">

            <small class="text-white-50">
                Système sécurisé - Accès réservé aux employés
            </small>

        </div>
    </div>
</div>

</body>
<!-- Bootstrap core JavaScript-->
<script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

<!-- Core plugin JavaScript-->
<script src="{% static 'vendor/jquery-easing/jquery.easing.min.js' %}"></script>

<!-- Custom scripts for all pages-->
<script src="{% static 'js/sb-admin-2.min.js' %}"></script>

<!-- Page level plugins -->
<script src="{% static 'vendor/chart.js/Chart.min.js' %}"></script>

<!-- Page level custom scripts -->
<script src="{% static 'js/demo/chart-area-demo.js' %}"></script>
<script src="{% static 'js/demo/chart-pie-demo.js' %}"></script>
</html>
