{% extends 'base.html' %}
{% block title %}
    Creation du client
{% endblock %}
{% block content %}

<div class="container-fluid mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h5>
                {% if customer %}
                    Modifier client
                {% else %}
                    Nouveau client
                {% endif %}
            </h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-outline-success btn-sm">Enregistrer</button>
            </form>
        </div>
        <div class="card-footer">
            <a href="{% url 'customer:customer_list' %}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left-square"></i> Retour
            </a>
        </div>
    </div>
</div>
{% endblock %}
