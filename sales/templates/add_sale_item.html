{% extends 'base.html' %}
{% block content %}

<div class="container-fluid mt-4">
    <div class="card shadow border-0 rounded-4">
        <div class="card-header">
            <h4>
                Ajouter produit - Vente #{{ sale.id }}
            </h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">
                        Produit
                    </label>
                    <select name="product"
                            class="form-select"
                            required>

                        <option value="">
                            ---------
                        </option>
                        {% for product in products %}
                        <option value="{{ product.id }}">
                            {{ product.name }}
                            (Stock : {{ product.stock }})

                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Quantité
                    </label>
                    <input type="number"
                           name="quantity"
                           class="form-control"
                           min="1"
                           value="1"
                           required>

                </div>
                <button class="btn btn-outline-success btn-sm">Ajouter</button>
                <a href="{% url 'sale:sale_detail' sale.id %}"
                   class="btn btn-outline-secondary btn-sm">
                    Retour
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
